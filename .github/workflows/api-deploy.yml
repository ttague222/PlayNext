# PlayNxt API - CI/CD Pipeline
# Deploys to Google Cloud Run on push to main

name: API Deploy

on:
  push:
    branches: [main]
    paths:
      - 'api-service/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE: playnxt-api
  REGION: us-central1

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: api-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true  # Don't fail if no tests yet

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        # Note: --set-secrets removed 2026-06-02. The 4 secrets (SENTRY_DSN,
        # FIREBASE_CREDENTIALS, OPENAI_API_KEY, PINECONE_API_KEY) referenced
        # in the original config did not exist in Secret Manager, and the
        # current code does not actually read them at runtime
        # (firebase_credentials_path is the real env name; Sentry init is
        # guarded; OpenAI/Pinecone aren't wired). Add specific secrets back
        # via --set-secrets when those features ship.
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source api-service \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production"

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "Service deployed to: $URL"
